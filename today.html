        :root {
            --bg: radial-gradient(circle at 20% 20%, #eef2ff, #f8fafc 45%), radial-gradient(circle at 80% 0%, #e0f2fe, #f8fafc 50%);

        /* Тёмная тема от основной страницы */
        body[data-theme="dark"] {
            --bg: radial-gradient(circle at 20% 20%, #111827, #0b1224 45%), radial-gradient(circle at 80% 0%, #0f172a, #0b1224 50%);
            --card-bg: rgba(17, 24, 39, 0.9);
            --card-border: rgba(124, 156, 255, 0.18);
            --text: #e5e7eb;
            --muted: #9ca3af;
            --accent: #8ba7ff;
            --shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
        }
        body[data-theme="dark"] .card::after { background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(124,156,255,0.08)); }
        body[data-theme="dark"] .forecast-item { background: rgba(124,156,255,0.08); border-color: rgba(124,156,255,0.16); }

        body[data-theme="dark"] .glossy-btn::before { background: linear-gradient(120deg, #8ba7ff, #4f66ff, #8ba7ff); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
            gap: 1.25rem;
            overflow-x: hidden;
        }
        header {
            width: 100%;
            max-width: 1180px;
            display: flex;
            align-items: center;
            justify-content: space-between;

        .glossy-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.6rem 1.5rem;
            border-radius: 999px;
            font-weight: 600;
            color: var(--accent);
            background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(219,234,254,0.9));
            border: 1.5px solid transparent;
            background-origin: border-box;
            box-shadow: 0 10px 26px rgba(37, 99, 235, 0.22), inset 0 0 0 1px rgba(255,255,255,0.65);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .glossy-btn::before {
            content: "";
            position: absolute;
            inset: 0;
            padding: 1.5px;
            border-radius: 999px;
            background: linear-gradient(120deg, #7c9cff, #2563eb, #7c9cff);
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .glossy-btn:hover { transform: translateY(-1px); box-shadow: 0 14px 30px rgba(37, 99, 235, 0.26), inset 0 0 0 1px rgba(255,255,255,0.65); }
        .glossy-btn:active { transform: translateY(0); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }

        .grid {
            width: 100%;
            max-width: 1180px;
            display: grid;

            gap: 1rem;
        }

        .grid.weather-open {
            grid-template-columns: 1fr;
        }
        .grid.weather-open .card:not(#weatherCard) { display: none; }
        .grid.weather-open #weatherCard { width: 100%; }
        .card {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 1.15rem 1.2rem;
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card.expandable { cursor: default; }

            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(37,99,235,0.05));
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .card h3 { margin-bottom: 0.2rem; font-size: 1.05rem; letter-spacing: -0.01em; }
        .card small { color: var(--muted); }
        .value { margin-top: 0.45rem; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.01em; }
        .list { margin-top: 0.55rem; display: grid; gap: 0.35rem; }
        .list span { color: var(--muted); font-size: 0.95rem; }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.08);
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .forecast {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.35s ease, opacity 0.35s ease;
            opacity: 0;
            margin-top: 0.35rem;
        }
        .forecast.active {
            max-height: 600px;
            opacity: 1;
        }
        .forecast-list { display: grid; gap: 0.35rem; }
        .forecast-item {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 0.5rem;
            padding: 0.45rem 0.55rem;
            border-radius: 12px;
            background: rgba(37,99,235,0.04);
            border: 1px solid rgba(37,99,235,0.08);
        }
        .forecast-item small { color: var(--muted); }
        .temp {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            font-weight: 600;
        }
        .temp span { font-size: 0.95rem; }

        .toggle-btn {
            margin-top: 0.6rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;

        .bubble {
            position: absolute;
            width: 44px;

        @keyframes floaty {

        .dot { position: absolute; width: 16px; height: 16px; border-radius: 50%; background: #22c55e; box-shadow: 0 8px 18px rgba(34,197,94,0.35); transition: transform 0.2s ease; cursor: pointer; }

            border-radius: 999px;
            transform: translateY(-50%);

        }
        .slider-bar {
            position: absolute;
            top: 0; bottom: 0;
            width: 120px;
            border-radius: 999px;
            background: linear-gradient(90deg, #7c9cff, #2563eb);
            animation: slide 2.4s ease-in-out infinite alternate;
        }
        @keyframes slide {
            from { left: 6px; }
            to { left: calc(100% - 126px); }
        }

        .stat-line { display: flex; align-items: center; justify-content: space-between; gap: 0.4rem; margin-top: 0.45rem; color: var(--muted); font-size: 0.95rem; }

        @media (max-width: 620px) {
            header { flex-direction: column; align-items: flex-start; }
            body { padding: 1rem; }
            .glossy-btn {
                padding: 0.5rem 1.05rem;
                font-size: 0.9rem;
                min-width: unset;
            }
        }
    </style>

<body data-theme="blue">
    <header class="fade-in">
        <div class="title">
            <h1>Сегодня (Beta)</h1>
        </div>
        <a class="glossy-btn" href="index.html">← Назад к расписанию</a>
    </header>

    <section class="grid fade-in" style="animation-delay: 0.05s;" id="mainGrid">
        <article class="card expandable" id="weatherCard">
            <div class="pill">☀️ Погода</div>
            <div class="value" id="weather-value">Загружаю...</div>
            <div class="list" id="weather-extra"></div>
            <div class="forecast" id="forecastBlock">
                <div class="forecast-list" id="forecastList"></div>
            </div>
        </article>
    </section>

    <footer class="fade-in" style="animation-delay: 0.1s;">Обновлено сейчас · Beta</footer>

    <script>
        // Подхват темы из localStorage главной страницы
        (function syncTheme() {
            try {
                const saved = localStorage.getItem('scheduleApp');
                if (!saved) return;
                const parsed = JSON.parse(saved);
                const theme = parsed?.theme;
                if (theme === 'dark') document.body.dataset.theme = 'dark';
                else if (theme === 'blue') document.body.dataset.theme = 'blue';
            } catch (e) {
                /* ignore */
            }
        })();

        const weatherValue = document.getElementById('weather-value');
        const weatherExtra = document.getElementById('weather-extra');
        const weatherCard = document.getElementById('weatherCard');
        const forecastBlock = document.getElementById('forecastBlock');
        const forecastList = document.getElementById('forecastList');
        const mainGrid = document.getElementById('mainGrid');
        let forecastLoaded = false;
        async function loadWeather() {
            try {
                const url = 'https://api.open-meteo.com/v1/forecast?latitude=55.03&longitude=82.92&current=temperature_2m,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Asia%2FNovosibirsk';
                const res = await fetch(url);
                if (!res.ok) throw new Error('weather');
                const data = await res.json();
                const cur = data?.current || {};
                const t = Math.round(cur.temperature_2m);
                const wind = Math.round(cur.wind_speed_10m);
                const code = cur.weather_code;
                const map = {
                    0: 'Ясно', 1: 'Ясно', 2: 'Облачно', 3: 'Пасмурно',
                    45: 'Туман', 48: 'Изморозь', 51: 'Морось', 53: 'Морось', 55: 'Сильная морось',
                    61: 'Дождь', 63: 'Дождь', 65: 'Сильный дождь', 71: 'Снег', 73: 'Снег', 75: 'Сильный снег',
                    80: 'Ливень', 81: 'Ливень', 82: 'Сильный ливень', 95: 'Гроза', 99: 'Гроза с градом'
                };
                weatherValue.textContent = `${t}°C · ${map[code] || 'без осадков'}`;
                weatherExtra.innerHTML = `<span>Ветер: ${wind} м/с</span><span>Обновлено сейчас</span>`;

                if (data?.daily?.time?.length) {
                    renderForecast(data.daily, map);
                    forecastLoaded = true;
                }
            } catch (e) {
                weatherValue.textContent = 'Погода недоступна';
                weatherExtra.innerHTML = '<span>Проверь соединение позже</span>';
            }
        }

        function renderForecast(daily, map) {
            const rows = daily.time.map((date, idx) => {
                const dayLabel = new Date(date).toLocaleDateString('ru-RU', { weekday: 'short', day: '2-digit', month: '2-digit' });
                const day = Math.round(daily.temperature_2m_max[idx]);
                const night = Math.round(daily.temperature_2m_min[idx]);
                const code = daily.weathercode[idx];
                const desc = map[code] || '—';
                return `<div class="forecast-item">
                    <div><strong>${dayLabel}</strong><br><small>${desc}</small></div>
                    <div class="temp"><span>днём ${day}°</span></div>
                    <div class="temp" style="color:${night <=0 ? '#2563eb' : '#0f172a'};"><span>ночью ${night}°</span></div>
                </div>`;
            }).slice(0,7).join('');
            forecastList.innerHTML = rows;
        }

        loadWeather();

        weatherCard.addEventListener('click', () => {
            if (!forecastLoaded) return;
            const isOpen = forecastBlock.classList.toggle('active');
            if (isOpen) {
                mainGrid.classList.add('weather-open');
            } else {
                mainGrid.classList.remove('weather-open');
            }
        });
    </script>
