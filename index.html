<html lang="ru">
<head>

            (function(m,e,t,r,i,k,a){
                m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
                m[i].l=1*new Date();
                for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
                k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
            })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=107250153', 'ym');

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --bg: #030712;
            --card-bg: rgba(30, 41, 59, 0.5);
            --island-bg: rgba(15, 23, 42, 0.75);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body.light {
            --bg: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.7);
            --island-bg: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 0, 0, 0.08);
            --text: #0f172a;
            --text-dim: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding-bottom: 140px;
            line-height: 1.5;
        }

        .glow-sphere {
            position: fixed; width: 400px; height: 400px; border-radius: 50%;
            background: var(--accent-glow); filter: blur(120px); z-index: -1; pointer-events: none;
            opacity: 0.4; animation: float 20s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(20%, 30%) scale(1.2); }
        }

        .app-container { max-width: 800px; margin: 0 auto; padding: 1.5rem; position: relative; z-index: 1; }

        /* Floating Island Dock — три кнопки */
        .island-dock {
        position: fixed; 
        bottom: 0.5rem;   /* было 2.5rem */
        left: 50%; 
        transform: translateX(-50%);
        width: 90%; 
        max-width: 460px; 
        height: 74px;
        background: var(--island-bg); 
        backdrop-filter: blur(25px) saturate(180%);
        border-radius: 2.2rem; 
        border: 1px solid var(--border);
        display: flex; 
        align-items: center; 
        justify-content: space-between;
        padding: 0 0.6rem; 
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        z-index: 9999; 
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

        .island-section { display: flex; align-items: center; justify-content: center; flex: 1; }
        .island-btn {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-dim); cursor: pointer; transition: all 0.2s;
            position: relative; min-width: 60px;
        }
        .island-btn i { font-size: 1.3rem; margin-bottom: 2px; }
        .island-btn span { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .island-btn.active { color: var(--accent); }
        .island-btn:active { transform: scale(0.9); }

        /* Центральная кнопка (сегодня) */
        .island-main-btn {
            width: 58px; height: 58px; background: var(--accent); color: white;
            border-radius: 1.8rem; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px var(--accent-glow); transform: translateY(-12px);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .island-main-btn:active { transform: translateY(-8px) scale(0.9); }

        /* Общие стили для попапов */
        .island-popup {
            position: fixed; bottom: 8rem; right: 5%; width: 240px;
            background: var(--island-bg); backdrop-filter: blur(30px);
            border-radius: 1.8rem; border: 1px solid var(--border);
            padding: 0.8rem; display: none; flex-direction: column; gap: 0.4rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); z-index: 10000;
            animation: popupIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .island-popup.active { display: flex; }
        @keyframes popupIn { from { opacity: 0; transform: translateY(20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* Второй уровень меню (для недели) — смещаем влево, чтобы не наезжало */
        .island-popup.submenu {
            right: auto;
            left: calc(50% + 40px);
            bottom: 8rem;
            width: 200px;
        }
        @media (max-width: 500px) {
            .island-popup.submenu { left: auto; right: 5%; bottom: 15rem; }
        }

        .popup-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.9rem 1.1rem; border-radius: 1.2rem; cursor: pointer;
            transition: background 0.2s; color: var(--text); font-weight: 500; font-size: 0.9rem;
        }
        .popup-row:hover { background: rgba(255,255,255,0.08); }
        body.light .popup-row:hover { background: rgba(0,0,0,0.04); }
        .popup-row i { color: var(--accent); font-size: 1.1rem; }
        .popup-row .fa-chevron-right { margin-left: auto; font-size: 0.8rem; opacity: 0.7; }

        /* Карточки расписания */
        .day-card {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 1.8rem; border: 1px solid var(--border);
            margin-bottom: 1.5rem; overflow: hidden; transition: transform 0.3s;
        }
        .day-card.today { border: 1px solid var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
        .day-card__header { 
            padding: 1rem 1.4rem; background: rgba(0,0,0,0.15); 
            font-weight: 800; font-size: 1.1rem; color: var(--text-dim);
            display: flex; align-items: center; gap: 0.6rem;
        }
        .today .day-card__header { color: var(--accent); }

        .lessons-table { width: 100%; border-collapse: collapse; }
        .lessons-table td { padding: 1.1rem 1.4rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .time-col { width: 95px; color: var(--accent); font-weight: 800; font-size: 0.85rem; }
        .room-tag { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; display: block; font-weight: 500; }
        .room-badge { font-weight: 600; }
        .current-lesson { background: rgba(59, 130, 246, 0.1); }

        .note-box {
            padding: 0.6rem 1.4rem; background: rgba(255, 215, 0, 0.1);
            color: #ffd700; font-size: 0.75rem; font-style: italic; display: flex; align-items: center; gap: 8px;
        }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center; z-index: 100000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--island-bg); padding: 2rem; border-radius: 2rem; 
            width: 90%; max-width: 380px; border: 1px solid var(--border);
        }
        .admin-input {
            width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: none;
            background: rgba(255,255,255,0.05); color: white; outline: none;
        }

        .skeleton { height: 100px; background: var(--card-bg); border-radius: 1.8rem; margin-bottom: 1rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.8; } }

        footer { margin-top: 3rem; text-align: center; opacity: 0.4; font-size: 0.7rem; padding: 1rem; cursor: pointer; }
    </style>
</head>

    <script>
        // ==================== STORE ====================
        const AppStore = {
            state: { subgroup: '1', theme: 'auto', selectedWeek: 'auto', notes: {} },
            init() {
                const saved = localStorage.getItem('sh_v31');
                if (saved) this.state = { ...this.state, ...JSON.parse(saved) };
                this.save();
                this.applyActualTheme();
                this.listenSystemTheme();
            },
            save() { localStorage.setItem('sh_v31', JSON.stringify(this.state)); },
            
            applyActualTheme() {
                let effectiveTheme = this.state.theme;
                if (effectiveTheme === 'auto') {
                    effectiveTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                document.body.className = effectiveTheme === 'light' ? 'light' : '';
            },
            
            listenSystemTheme() {
                const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
                const handler = () => {
                    if (this.state.theme === 'auto') this.applyActualTheme();
                };
                mediaQuery.addEventListener ? mediaQuery.addEventListener('change', handler) : mediaQuery.addListener(handler);
            },
            
            toggleTheme() {
                const modes = ['dark', 'light', 'auto'];
                let idx = modes.indexOf(this.state.theme);
                this.state.theme = modes[(idx + 1) % modes.length];
                this.save();
                this.applyActualTheme();
            },
            
            setWeek(week) {
                this.state.selectedWeek = week;
                this.save();
            }
        };

        // ========== Нормализация времени ==========
        function normalizeTime(timeStr) {
            if (!timeStr) return '';
            const match = timeStr.match(/(\d{1,2}):(\d{2})/);
            if (!match) return '';
            let hours = parseInt(match[1], 10);
            let minutes = parseInt(match[2], 10);
            if (isNaN(hours) || isNaN(minutes)) return '';
            hours = hours % 24;
            minutes = minutes % 60;
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
        }

        // ==================== ПАРСЕР ====================
        class ScheduleParser {
            static parseSemester(html) {
                const doc = new DOMParser().parseFromString(html, 'text/html');
                let scheduleTable = doc.querySelector('#schedule_table_och_sem .schedule_table table');
                if (!scheduleTable) scheduleTable = doc.querySelector('#schedule_table_och_sem table');
                if (!scheduleTable) scheduleTable = doc.querySelector('.schedule_table table');
                if (!scheduleTable) return [];
                
                const rows = scheduleTable.querySelectorAll('tbody tr');
                const schedule = [];
                let currentDay = '';
                const dayNames = ['пн', 'вт', 'ср', 'чт', 'пт', 'сб', 'вс'];
                
                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    const cells = row.querySelectorAll('td');
                    if (cells.length < 4) continue;
                    
                    const firstCell = cells[0];
                    let dayText = firstCell.innerText.trim().toLowerCase().replace(/[^а-я]/g, '');
                    let isDayRow = firstCell.classList && firstCell.classList.contains('day-header');
                    if (!isDayRow && dayText.length >= 2 && dayNames.includes(dayText.substring(0,2))) {
                        isDayRow = true;
                        dayText = dayText.substring(0,2);
                    }
                    if (isDayRow && dayText.length >= 2) {
                        currentDay = dayText.substring(0,2);
                    }
                    if (!currentDay) continue;
                    
                    const timeCell = cells[1];
                    let timeText = '';
                    const timeDiv = timeCell.querySelector('.time');
                    if (timeDiv) timeText = timeDiv.innerText.trim();
                    if (!timeText) {
                        const extendDiv = timeCell.querySelector('.extend_time');
                        if (extendDiv) timeText = extendDiv.innerText.trim().split('--')[0];
                    }
                    const startTime = normalizeTime(timeText);
                    if (!startTime) continue;
                    
                    const lesson1 = this.parseLessonCell(cells[2]);
                    const lesson2 = this.parseLessonCell(cells[3]);
                    
                    if (lesson1 && lesson1.name && lesson1.name.length >= 2) {
                        schedule.push({ day: currentDay, time: startTime, week: 1, ...lesson1 });
                    }
                    if (lesson2 && lesson2.name && lesson2.name.length >= 2) {
                        schedule.push({ day: currentDay, time: startTime, week: 2, ...lesson2 });
                    }
                }
                console.log(`Распарсено пар: ${schedule.length}, дни: ${[...new Set(schedule.map(l=>l.day))].join(', ')}`);
                return schedule;
            }
            
            static parseLessonCell(cell) {
                if (!cell) return null;
                const html = cell.innerHTML;
                if (html.trim() === '' || html === '&nbsp;') return null;
                
                let name = '';
                const mainDiv = cell.querySelector('.mainScheduleInfo');
                if (mainDiv) {
                    let text = mainDiv.innerText.trim();
                    let parts = text.split(',');
                    name = parts[0].trim();
                    if (name.includes(' - ')) name = name.split(' - ')[0].trim();
                } else {
                    const shortDiv = cell.querySelector('.ShortScheduleInfo');
                    if (shortDiv) {
                        let text = shortDiv.innerText.trim();
                        let parts = text.split(',');
                        name = parts[0].trim();
                        if (name.includes(' - ')) name = name.split(' - ')[0].trim();
                    }
                }
                if (!name || name.length < 2) return null;
                
                let type = '';
                const typeDiv = cell.querySelector('.small.text-muted');
                if (typeDiv) type = typeDiv.innerText.trim();
                
                let location = '—';
                const roomLink = cell.querySelector('a[href*="/room/"]');
                if (roomLink) {
                    let roomText = roomLink.innerText.trim();
                    const parentText = roomLink.parentNode.innerText;
                    const matchExtra = parentText.match(/,\s*(.+?)(?:\s*<|$)/);
                    if (matchExtra && matchExtra[1].trim() !== roomText) {
                        location = roomText + ' ' + matchExtra[1].trim();
                    } else {
                        location = roomText;
                    }
                } else {
                    if (cell.innerText.includes('неизв.')) location = 'неизв.';
                }
                return { name, type, location };
            }
        }

        // ==================== ПРИЛОЖЕНИЕ ====================
        class ScheduleApp {
            constructor() {
                this.baseUrl = "https://rasps.nsuem.ru/group/9-%D0%98%D0%A1403/";
                this.clicks = 0;
                this.isAdmin = false;
                this.init();
            }

            async init() {
                AppStore.init();
                this.setupUI();
                await this.loadData();
                setInterval(() => this.loadData(), 600000);
            }

            setupUI() {
                // Левая кнопка — попап подгруппы
                const btnSub = document.getElementById('btnSubgroup');
                const subPopup = document.getElementById('subgroupPopup');
                btnSub.onclick = (e) => {
                    e.stopPropagation();
                    subPopup.classList.toggle('active');
                    document.getElementById('morePopup').classList.remove('active');
                    document.getElementById('weekSubmenu').classList.remove('active');
                };
                
                // Правая кнопка — попап "еще"
                const btnMore = document.getElementById('btnMore');
                const morePopup = document.getElementById('morePopup');
                btnMore.onclick = (e) => {
                    e.stopPropagation();
                    morePopup.classList.toggle('active');
                    subPopup.classList.remove('active');
                    document.getElementById('weekSubmenu').classList.remove('active');
                };
                
                // Триггер для подменю недели
                const weekTrigger = document.getElementById('weekMenuTrigger');
                const weekSubmenu = document.getElementById('weekSubmenu');
                weekTrigger.onclick = (e) => {
                    e.stopPropagation();
                    weekSubmenu.classList.toggle('active');
                };
                
                // Центральная кнопка
                document.getElementById('btnToday').onclick = () => this.scrollToToday();
                
                // Закрытие всех попапов при клике вне
                document.addEventListener('click', () => {
                    subPopup.classList.remove('active');
                    morePopup.classList.remove('active');
                    weekSubmenu.classList.remove('active');
                });
                
                this.updateIslandIndicators();
            }

            updateIslandIndicators() {
                const weekDisplay = AppStore.state.selectedWeek === 'auto' ? 'Авто' : AppStore.state.selectedWeek === '1' ? '1 неделя' : '2 неделя';
                document.getElementById('popupWeekText').textContent = weekDisplay;
                
                const themeIcon = document.querySelector('#morePopup .popup-row:nth-child(2) i');
                if (themeIcon) {
                    const mode = AppStore.state.theme;
                    themeIcon.className = mode === 'dark' ? 'fas fa-moon' : mode === 'light' ? 'fas fa-sun' : 'fas fa-circle-half-stroke';
                }
            }

            getCurrentWeek() {
                if (AppStore.state.selectedWeek !== 'auto') return AppStore.state.selectedWeek;
                const start = new Date(2024, 8, 1);
                const diff = Math.floor((new Date() - start) / (1000 * 60 * 60 * 24 * 7));
                return (diff % 2 === 0) ? '1' : '2';
            }

            async loadData() {
                const container = document.getElementById('cardsContainer');
                container.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';
                try {
                    const res = await fetch(this.baseUrl + AppStore.state.subgroup);
                    const html = await res.text();
                    const data = ScheduleParser.parseSemester(html);
                    this.render(data);
                } catch (e) {
                    console.error(e);
                    container.innerHTML = '<p style="text-align:center; padding:2rem">Ошибка загрузки. Проверьте интернет.</p>';
                }
            }

            addMinutes(time, mins) {
                if (!time || !time.includes(':')) return '--:--';
                const [h, m] = time.split(':').map(Number);
                const total = h * 60 + m + mins;
                const newHours = Math.floor(total / 60) % 24;
                const newMins = total % 60;
                return `${newHours.toString().padStart(2, '0')}:${newMins.toString().padStart(2, '0')}`;
            }

            isCurrentLesson(startTime) {
                if (!startTime) return false;
                const [h, m] = startTime.split(':').map(Number);
                const now = new Date();
                const start = h * 60 + m;
                const current = now.getHours() * 60 + now.getMinutes();
                return current >= start && current < start + 95;
            }

            formatRoom(location) {
                if (!location || location === '—') return '<span class="room-tag"><i class="fas fa-location-dot"></i> —</span>';
                return `<span class="room-tag"><i class="fas fa-location-dot"></i> <span class="room-badge">${this.escapeHtml(location)}</span></span>`;
            }

            escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
            }

            render(data) {
                const container = document.getElementById('cardsContainer');
                const targetWeek = parseInt(this.getCurrentWeek());
                const filtered = data.filter(l => l.week === targetWeek);
                
                if (filtered.length === 0) {
                    container.innerHTML = '<p style="text-align:center; padding:2rem">Пар не найдено</p>';
                    return;
                }

                const daysMap = new Map();
                filtered.forEach(l => {
                    if (!daysMap.has(l.day)) daysMap.set(l.day, []);
                    daysMap.get(l.day).push(l);
                });

                let html = '';
                const todayShort = new Date().toLocaleDateString('ru-RU', {weekday:'short'}).toLowerCase().slice(0,2);

                for (const [day, lessons] of daysMap) {
                    const isToday = day.toLowerCase().startsWith(todayShort);
                    html += `
                        <div class="day-card ${isToday ? 'today' : ''}">
                            <div class="day-card__header"><i class="fas fa-calendar-day"></i> ${this.escapeHtml(day)}</div>
                            <table class="lessons-table">
                    `;
                    
                    lessons.forEach(l => {
                        const key = `${day}_${l.time}_${l.week}`;
                        const isNow = isToday && this.isCurrentLesson(l.time);
                        const note = AppStore.state.notes[key];
                        const endTime = this.addMinutes(l.time, 90);
                        const roomHtml = this.formatRoom(l.location);
                        const lessonName = this.escapeHtml(l.name || 'Без названия');
                        const lessonType = this.escapeHtml(l.type || '');

                        html += `
                            <tr class="${isNow ? 'current-lesson' : ''}" onclick="app.addNote('${key.replace(/'/g, "\\'")}')">
                                <td class="time-col">
                                    ${this.escapeHtml(l.time)}–${endTime}
                                </td>
                                <td>
                                    <div style="font-weight:600; font-size:0.9rem">${lessonName}</div>
                                    ${lessonType ? `<div style="font-size:0.75rem; color:var(--accent)">${lessonType}</div>` : ''}
                                    ${roomHtml}
                                </td>
                            </tr>
                        `;
                        if (note) {
                            html += `<tr><td colspan="2" class="note-box"><i class="fas fa-pen-nib"></i> ${this.escapeHtml(note)}</td></tr>`;
                        }
                    });

                    html += `</table></div>`;
                }
                container.innerHTML = html;
            }

            changeSubgroup(val) {
                AppStore.state.subgroup = val;
                AppStore.save();
                this.updateIslandIndicators();
                this.loadData();
                document.getElementById('subgroupPopup').classList.remove('active');
            }

            setWeek(week) {
                AppStore.setWeek(week);
                this.updateIslandIndicators();
                this.loadData();
                document.getElementById('weekSubmenu').classList.remove('active');
                document.getElementById('morePopup').classList.remove('active');
            }

            toggleTheme() {
                AppStore.toggleTheme();
                this.updateIslandIndicators();
            }

            scrollToToday() {
                const el = document.querySelector('.day-card.today');
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            debugOutput() {
                const cards = document.querySelectorAll('.day-card');
                alert(`Отладка: карточек дней: ${cards.length}. Подробности в консоли (F12).`);
                console.log('Текущая подгруппа:', AppStore.state.subgroup);
                console.log('Неделя:', this.getCurrentWeek());
            }

            secretCounter() {
                this.clicks++;
                if (this.clicks >= 5) {
                    document.getElementById('loginModal').classList.add('active');
                    this.clicks = 0;
                }
            }

            tryLogin() {
                const u = document.getElementById('l_u').value;
                const p = document.getElementById('l_p').value;
                if (u === 'ydkova' && p === 'okeyshawty') {
                    this.isAdmin = true;
                    document.getElementById('loginModal').classList.remove('active');
                    alert('Режим админа включен. Нажимай на пары, чтобы добавить заметку.');
                } else alert('Неверно');
            }

            addNote(key) {
                if (!this.isAdmin) return;
                const note = prompt('Текст заметки:', AppStore.state.notes[key] || '');
                if (note !== null) {
                    if (note === '') delete AppStore.state.notes[key];
                    else AppStore.state.notes[key] = note;
                    AppStore.save();
                    this.loadData();
                }
            }
        }

        const app = new ScheduleApp();
    </script>
</body>
</html>
