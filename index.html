    <script type="module">
        // ==================== ХРАНИЛИЩЕ ====================
        const AppStore = {
            state: {
                subgroup: '1',
                theme: 'system',
                selectedWeek: 'auto',
                notes: {},
                visitCount: 0,
                lastLogin: null,
                cookieAccepted: false
            },

            getSystemTheme() {
                return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'blue';
            },

            init() {
                const saved = localStorage.getItem('scheduleApp');
                if (saved) {
                    try {
                        this.state = { ...this.state, ...JSON.parse(saved) };
                    } catch (e) {}
                }

                // Всегда применять системную тему при открытии
                this.state.theme = this.getSystemTheme();
                document.body.dataset.theme = this.state.theme;
                this.state.visitCount++;
                this.save();
                return this.state;
            },

            save() {
                localStorage.setItem('scheduleApp', JSON.stringify(this.state));
            },

            update(key, value) {
                if (key in this.state) {
                    this.state[key] = value;
                    if (key === 'theme') document.body.dataset.theme = value;
                    this.save();
                }
            }
        };

        // ==================== ПАРСЕР ====================
        class ScheduleParser {
            static parseSemester(html) {
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const tables = doc.querySelectorAll('table');
                if (tables.length < 2) return [];
                const rows = tables[1].querySelectorAll('tr');
                const schedule = [];
                let currentDay = '';

                for (let i = 1; i < rows.length; i++) {
                    const cells = rows[i].querySelectorAll('td');
                    if (cells.length < 4) continue;

                    const dayCell = cells[0]?.textContent.trim();
                    if (dayCell && /[а-я]{2}/i.test(dayCell)) currentDay = dayCell;

                    // Fix for double time issue - extract only the first time if there are duplicates
                    let time = cells[1]?.textContent.trim();
                    if (time && /^(\d{2}:\d{2})\1/.test(time)) {
                        time = time.match(/^(\d{2}:\d{2})\1/)[1];
                    } else if (time && time.length > 5 && !time.includes('-') && !time.includes('–') && !time.includes('—')) {
                        // If time is longer than 5 chars and doesn't contain dashes, extract first 5 chars (HH:MM)
                        time = time.substring(0, 5);
                    }
                    const week1 = this.parseLessonCell(cells[2]);
                    const week2 = this.parseLessonCell(cells[3]);

                    week1.forEach(l => schedule.push({ day: currentDay, time, week: 1, name: l.name, type: l.type, location: l.location, teacher: l.teacher }));
                    week2.forEach(l => schedule.push({ day: currentDay, time, week: 2, name: l.name, type: l.type, location: l.location, teacher: l.teacher }));
                }
                return schedule;
            }

            static parseLessonCell(cell) {
                if (!cell) return [];
                const clone = cell.cloneNode(true);
                clone.innerHTML = clone.innerHTML.replace(/<br\s*\/?>/g, '|');
                return clone.textContent.split('|').map(s => s.trim()).filter(s => s).map(text => {
                    // Extract lesson type first
                    const typeMatch = text.match(/(Лекция|Семинар|Экзамен|Консультация|Практика)/i);
                    let type = typeMatch ? typeMatch[0] : '';

                    // Remove type from text for cleaner parsing
                    let cleanText = text.replace(type, '').replace(/,\s*,/g, ',').replace(/,\s*$/, '').trim();

                    // Split by commas to get parts
                    const parts = cleanText.split(',').map(s => s.trim()).filter(s => s);

                    // Determine name, location, and teacher
                    let name = parts[0] || cleanText;
                    let location = '';
                    let teacher = '';

                    // If there are multiple parts, try to determine location and teacher
                    if (parts.length > 1) {
                        // Location is typically a room number (contains digits and possibly hyphens)
                        // Teacher is typically a name (contains letters and spaces)
                        const possibleLocation = parts[1];
                        const possibleTeacher = parts[2] || '';

                        // Simple heuristic: if it looks like a room number, it's location
                        if (possibleLocation && /\d+[-\d]*\d*|[а-я]+\d+|[а-я]+\-\d+/.test(possibleLocation)) {
                            location = possibleLocation;
                            teacher = possibleTeacher;
                        } else {
                            // If first part doesn't look like location, maybe second part is
                            location = possibleTeacher;
                        }
                    }

                    return { name, type, location, teacher };
                });
            }
        }

        // ==================== РЕНДЕРЕР ====================
        class ScheduleRenderer {
            constructor(container, store) {
                this.container = container;
                this.store = store;
            }

            parseTimeToMinutes(timeValue) {
                const cleanTime = (timeValue || '').split(/[-–—]/)[0].trim();
                const match = cleanTime.match(/^(\d{1,2}):(\d{2})/);
                if (!match) return null;
                return parseInt(match[1], 10) * 60 + parseInt(match[2], 10);
            }

            formatMinutesToTime(totalMinutes) {
                const hours = Math.floor(totalMinutes / 60);
                const minutes = totalMinutes % 60;
                return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
            }

            getLessonTimeRange(startTime) {
                const startMinutes = this.parseTimeToMinutes(startTime);
                if (startMinutes === null) return '00:00–01:30';
                const endMinutes = startMinutes + 90;
                return `${this.formatMinutesToTime(startMinutes)}–${this.formatMinutesToTime(endMinutes)}`;
            }

            normalizeLocation(location) {
                if (!location) return '—';

                const cleanLocation = location.replace(/\s+/g, ' ').trim();
                const gymMatch = cleanLocation.match(/спортзал\s*([23])/i);
                if (gymMatch) {
                    return `спортзал ${gymMatch[1]}`;
                }

                const roomMatch = cleanLocation.match(/\b\d-\d{2,4}\b/);
                if (roomMatch) {
                    return roomMatch[0];
                }

                return '—';
            }

            isCurrentLesson(day, startTime) {
                const now = new Date();
                const curDay = now.toLocaleDateString('ru-RU', { weekday: 'short' }).toLowerCase().slice(0, 2);
                if (!day.toLowerCase().startsWith(curDay)) return false;

                const currentMinutes = now.getHours() * 60 + now.getMinutes();
                const startMinutes = this.parseTimeToMinutes(startTime);
                if (startMinutes === null) return false;
                const endMinutes = startMinutes + 90;

                return currentMinutes >= startMinutes && currentMinutes < endMinutes;
            }

            renderSemester(data) {
                if (!data.length) {
                    this.container.innerHTML = '<div class="error-message">Нет данных для отображения</div>';
                    return;
                }

                const daysMap = new Map();
                data.forEach(lesson => {
                    if (!daysMap.has(lesson.day)) {
                        daysMap.set(lesson.day, []);
                    }
                    daysMap.get(lesson.day).push(lesson);
                });

                const today = new Date().toLocaleDateString('ru-RU', { weekday: 'short' }).toLowerCase().slice(0, 2);
                let html = '';

                for (const [day, lessons] of daysMap.entries()) {
                    // Sort by time properly - convert to minutes since midnight
                    lessons.sort((a, b) => {
                        const timeA = (a.time.split(/[-–—]/)[0] || a.time).trim();
                        const timeB = (b.time.split(/[-–—]/)[0] || b.time).trim();

                        // Extract hours and minutes
                        const matchA = timeA.match(/^(\d{1,2}):(\d{2})/);
                        const matchB = timeB.match(/^(\d{1,2}):(\d{2})/);

                        // Convert to minutes for accurate comparison
                        const minutesA = matchA ? parseInt(matchA[1]) * 60 + parseInt(matchA[2]) : 0;
                        const minutesB = matchB ? parseInt(matchB[1]) * 60 + parseInt(matchB[2]) : 0;

                        return minutesA - minutesB;
                    });
                    const isToday = day.toLowerCase().startsWith(today);
                    html += `<div class="day-card ${isToday ? 'today' : ''}">`;
                    html += `<div class="day-card__header">${day}</div>`;
                    html += '<table class="lessons-table">';
                    html += '<thead><tr><th>Время</th><th>Дисциплина</th><th>Аудитория</th></tr></thead>';
                    html += '<tbody>';

                    lessons.forEach(lesson => {
                        const key = `${day}_${lesson.time}_${lesson.week}`;
                        const note = this.store.state.notes[key];
                        const isCurrent = this.isCurrentLesson(day, lesson.time) ? 'current-lesson' : '';

                        html += `<tr class="${isCurrent}" data-lesson-key="${key}">`;
                        const timeRange = this.getLessonTimeRange(lesson.time);
                        const normalizedLocation = this.normalizeLocation(lesson.location);
                        html += `<td>${timeRange}</td>`;
                        html += `<td>${lesson.name} ${lesson.type ? `(${lesson.type})` : ''}</td>`;
                        html += `<td>${normalizedLocation}</td>`;
                        html += '</tr>';
                        if (note) {
                            html += `<tr class="lesson-note-row"><td colspan="3"><div class="lesson-note">📝 ${note}</div></td></tr>`;
                        }
                    });

                    html += '</tbody></table>';
                    html += '</div>';
                }

                this.container.innerHTML = html;
            }

            showError(message) {
                this.container.innerHTML = `<div class="error-message">${message}</div>`;
            }
        }

        // ==================== ГЛАВНОЕ ПРИЛОЖЕНИЕ ====================
        class App {
            constructor() {
                this.store = AppStore;
                this.state = this.store.init();
                this.renderer = null;
                this.isAdmin = false;
                this.lastScrollY = 0;
                this.scrollTicking = false;
                this.baseUrls = {
                    '1': 'https://rasps.nsuem.ru/group/9-%D0%98%D0%A1403/1',
                    '2': 'https://rasps.nsuem.ru/group/9-%D0%98%D0%A1403/2'
                };
            }

            async init() {
                this.renderer = new ScheduleRenderer(document.getElementById('cardsContainer'), this.store);
                this.setupEventListeners();

                // При открытии неделя всегда определяется автоматически по текущей дате
                this.store.update('selectedWeek', 'auto');

                // Синхронизация переключателя с применённой темой
                const themeToggle = document.getElementById('themeToggle');
                if (themeToggle) themeToggle.checked = this.state.theme === 'dark';

                await this.loadWeather();
                await this.loadSchedule({ showSkeleton: true, animate: false });
                this.initWeekIndicator();
                this.initCookieBanner();
                this.initMobileHeaderBehavior();
                setInterval(() => this.loadSchedule({ showSkeleton: false, animate: false }), 60000);
                setInterval(() => this.loadWeather(), 600000);
            }

            initMobileHeaderBehavior() {
                const mobileQuery = window.matchMedia('(max-width: 768px)');
                const onScroll = () => {
                    if (!mobileQuery.matches) {
                        document.body.classList.remove('header-hidden');
                        this.lastScrollY = window.scrollY;
                        return;
                    }

                    const currentY = window.scrollY;
                    const delta = currentY - this.lastScrollY;

                    if (currentY <= 10 || delta < -5) {
                        document.body.classList.remove('header-hidden');
                    } else if (delta > 5 && currentY > 80) {
                        document.body.classList.add('header-hidden');
                    }

                    this.lastScrollY = currentY;
                    this.scrollTicking = false;
                };

                this.lastScrollY = window.scrollY;

                window.addEventListener('scroll', () => {
                    if (this.scrollTicking) return;
                    this.scrollTicking = true;
                    requestAnimationFrame(onScroll);
                }, { passive: true });

                mobileQuery.addEventListener('change', () => {
                    if (!mobileQuery.matches) {
                        document.body.classList.remove('header-hidden');
                    }
                    this.lastScrollY = window.scrollY;
                });
            }

            getWeatherDescription(code) {
                const map = {
                    0: 'ясно',
                    1: 'преимущественно ясно',
                    2: 'переменная облачность',
                    3: 'пасмурно',
                    45: 'туман',
                    48: 'изморозь',
                    51: 'морось',
                    53: 'морось',
                    55: 'сильная морось',
                    56: 'ледяная морось',
                    57: 'ледяная морось',
                    61: 'дождь',
                    63: 'дождь',
                    65: 'сильный дождь',
                    66: 'ледяной дождь',
                    67: 'ледяной дождь',
                    71: 'снег',
                    73: 'снег',
                    75: 'сильный снег',
                    77: 'снежные зёрна',
                    80: 'ливень',
                    81: 'ливень',
                    82: 'сильный ливень',
                    85: 'снегопад',
                    86: 'сильный снегопад',
                    95: 'гроза',
                    96: 'гроза с градом',
                    99: 'сильная гроза с градом'
                };
                return map[code] || 'без данных';
            }

            async loadWeather() {
                const weatherEl = document.getElementById('weatherNow');
                if (!weatherEl) return;

                try {
                    const url = 'https://api.open-meteo.com/v1/forecast?latitude=55.03&longitude=82.92&current=temperature_2m,weather_code&timezone=Asia%2FNovosibirsk';
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('Ошибка загрузки погоды');
                    const data = await res.json();

                    const temp = Math.round(data?.current?.temperature_2m);
                    const code = data?.current?.weather_code;
                    const desc = this.getWeatherDescription(code);

                    weatherEl.textContent = `Новосибирск: ${temp}°C, ${desc}`;
                } catch (e) {
                    weatherEl.textContent = 'Новосибирск: погода недоступна';
                }
            }

            showLoadingSkeleton() {
                const container = document.getElementById('cardsContainer');
                container.innerHTML = Array.from({ length: 3 }).map(() => `
                    <div class="day-card skeleton-card">
                        <div class="skeleton-line header"></div>
                        <div class="skeleton-line wide"></div>
                        <div class="skeleton-line mid"></div>
                        <div class="skeleton-line short"></div>
                    </div>
                `).join('');
            }

            animateCards() {
                const container = document.getElementById('cardsContainer');
                container.classList.remove('cards-animate-in');
                void container.offsetWidth;
                container.classList.add('cards-animate-in');
                setTimeout(() => container.classList.remove('cards-animate-in'), 320);
            }

            setupEventListeners() {
                document.querySelectorAll('[data-subgroup]').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                    const sub = e.target.dataset.subgroup;
                    this.store.update('subgroup', sub);
                    document.querySelectorAll('[data-subgroup]').forEach(b => b.classList.toggle('active', b.dataset.subgroup === sub));
                    await this.loadSchedule({ showSkeleton: true, animate: true });
                    this.showNotification(`Подгруппа ${sub}`);
                });
                });

                document.getElementById('themeToggle')?.addEventListener('change', (e) => {
                    const theme = e.target.checked ? 'dark' : 'blue';
                    this.store.update('theme', theme);
                });

                document.querySelectorAll('.week-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                    const week = e.target.dataset.week;
                    this.store.update('selectedWeek', week);
                    document.querySelectorAll('.week-btn').forEach(b => b.classList.toggle('active', b.dataset.week === week));
                    await this.loadSchedule({ showSkeleton: true, animate: true });
                });
                });

                document.getElementById('adminLoginBtn').addEventListener('click', () => {
                    document.getElementById('loginModal').classList.add('active');
                });

                document.getElementById('loginSubmit').addEventListener('click', () => {
                    const user = document.getElementById('loginUsername').value;
                    const pass = document.getElementById('loginPassword').value;
                    if (user === 'ydkova' && pass === 'okeyshawty') {
                        this.isAdmin = true;
                        this.store.update('lastLogin', new Date().toISOString());
                        document.getElementById('loginModal').classList.remove('active');
                        this.showAdminPanel();
                        this.showNotification('Добро пожаловать, админ!', 'success');
                    } else {
                        document.getElementById('loginError').textContent = 'Неверный логин или пароль';
                    }
                });

                document.getElementById('loginModal').addEventListener('click', (e) => {
                    if (e.target === document.getElementById('loginModal')) e.target.classList.remove('active');
                });
            }

            initWeekIndicator() {
                const start = new Date(2024, 8, 1);
                const today = new Date();
                const diffDays = Math.floor((today - start) / (1000 * 60 * 60 * 24));
                const weekNumber = Math.floor(diffDays / 7) + 1;
                const realWeek = (weekNumber % 2 === 1) ? '1' : '2';

                document.getElementById('currentWeekLabel').innerText = `Сейчас ${realWeek}-я неделя`;

                let selected = this.state.selectedWeek;
                if (selected === 'auto') selected = realWeek;
                this.store.update('selectedWeek', selected);
                document.querySelectorAll('.week-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.week === selected);
                });
            }

            initCookieBanner() {
                if (!this.state.cookieAccepted) {
                    document.getElementById('cookieBanner').classList.add('show');
                }
                document.getElementById('acceptCookies').addEventListener('click', () => {
                    this.store.update('cookieAccepted', true);
                    document.getElementById('cookieBanner').classList.remove('show');
                });
            }

            async loadSchedule({ showSkeleton = false, animate = false } = {}) {
                const container = document.getElementById('cardsContainer');
                try {
                    if (showSkeleton) {
                        container.classList.add('transitioning');
                        this.showLoadingSkeleton();
                    }

                    const url = this.baseUrls[this.state.subgroup];
                    const res = await fetch(url);
                    if (!res.ok) throw new Error(`Ошибка загрузки: ${res.status} ${res.statusText}`);
                    const html = await res.text();
                    let data = ScheduleParser.parseSemester(html);
                    const week = this.state.selectedWeek === 'auto' ? this.getRealWeek() : this.state.selectedWeek;
                    data = data.filter(lesson => lesson.week === parseInt(week));
                    this.renderer.renderSemester(data);
                    if (animate) this.animateCards();
                } catch (e) {
                    console.error(e);
                    this.renderer.showError('Ошибка подключения к расписанию. Попробуйте позже.');
                } finally {
                    container.classList.remove('transitioning');
                }
            }

            getRealWeek() {
                const start = new Date(2024, 8, 1);
                const diffDays = Math.floor((new Date() - start) / (1000 * 60 * 60 * 24));
                return (Math.floor(diffDays / 7) + 1) % 2 === 1 ? '1' : '2';
            }

            showAdminPanel() {
                const container = document.getElementById('adminPanel');
                container.style.display = 'block';
                container.innerHTML = this.renderAdminPanel();
                this.attachAdminHandlers();
            }

            renderAdminPanel() {
                const notes = Object.entries(this.store.state.notes).map(([k, v]) =>
                    `<div class="note-item"><span>${k}: ${v}</span><button data-note-key="${k}">Удалить</button></div>`
                ).join('');
                return `
                    <div class="admin-panel">
                        <h3>🔧 Панель администратора</h3>
                        <div class="admin-stats">
                            <div class="stat-card"><div class="value">${this.store.state.visitCount}</div><div>Посещений</div></div>
                            <div class="stat-card"><div class="value">${Object.keys(this.store.state.notes).length}</div><div>Заметок</div></div>
                            <div class="stat-card"><div class="value">${this.store.state.lastLogin ? new Date(this.store.state.lastLogin).toLocaleDateString() : '—'}</div><div>Последний вход</div></div>
                        </div>
                        <div class="admin-notes"><h4>Заметки к занятиям:</h4>${notes || '<p>Пока нет заметок.</p>'}</div>
                        <button class="admin-btn" id="clearAllNotes">Очистить все заметки</button>
                        <button class="admin-btn" id="exportNotes">Экспорт заметок</button>
                        <p style="margin-top:1rem; font-size:0.8rem;">💡 Кликните на строку занятия, чтобы добавить/редактировать заметку (только для админа).</p>
                    </div>
                `;
            }

            attachAdminHandlers() {
                document.getElementById('clearAllNotes')?.addEventListener('click', () => {
                    this.store.state.notes = {};
                    this.store.save();
                    this.showAdminPanel();
                    this.loadSchedule();
                });
                document.getElementById('exportNotes')?.addEventListener('click', () => {
                    const blob = new Blob([JSON.stringify(this.store.state.notes, null, 2)], { type: 'application/json' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'notes.json';
                    a.click();
                });
                document.querySelectorAll('[data-note-key]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const key = e.target.dataset.noteKey;
                        delete this.store.state.notes[key];
                        this.store.save();
                        this.showAdminPanel();
                        this.loadSchedule();
                    });
                });
            }

            showNotification(msg, type = 'info') {
                const n = document.createElement('div');
                n.className = `notification ${type}`;
                n.textContent = msg;
                document.getElementById('notificationContainer').appendChild(n);
                setTimeout(() => n.remove(), 3000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const app = new App();
            app.init();

            document.addEventListener('click', (e) => {
                if (!app.isAdmin) return;
                const row = e.target.closest('tr[data-lesson-key]');
                if (!row) return;
                const key = row.dataset.lessonKey;
                const note = prompt('Введите заметку к этому занятию:', app.store.state.notes[key] || '');
                if (note !== null) {
                    if (note.trim() === '') delete app.store.state.notes[key];
                    else app.store.state.notes[key] = note;
                    app.store.save();
                    app.loadSchedule();
                }
            });
        });
    </script>
