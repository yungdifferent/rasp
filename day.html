<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Личный кабинет — скоро</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f8a5c2, #c86dd7, #6c5ce7);
            background-size: 300% 300%;
            animation: gradientShift 6s ease infinite;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* декоративные размытые круги */
        body::before,
        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            filter: blur(60px);
            pointer-events: none;
        }
        body::before {
            top: -100px;
            left: -100px;
            animation: float 12s infinite alternate;
        }
        body::after {
            bottom: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.2);
            filter: blur(80px);
            animation: floatReverse 10s infinite alternate;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }
        @keyframes floatReverse {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-40px, -30px) scale(1.3); }
        }

        .card {
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            padding: 3rem 2rem;
            max-width: 500px;
            width: 85%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), inset 0 1px 1px rgba(255, 255, 255, 0.3);
            animation: fadeUp 0.8s ease-out;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.02);
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #ffe6f0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .soon-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.25);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            backdrop-filter: blur(4px);
            margin: 1rem 0 1.5rem;
            letter-spacing: 0.5px;
        }

        p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 0.6rem 1.5rem;
            border-radius: 3rem;
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .back-link:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
        }

        @media (max-width: 550px) {
            .card { padding: 2rem 1.5rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1> Еще одна страница </h1>
        <div class="soon-badge">✨ Скоро будет доступно ✨</div>
        <a href="index.html" class="back-link"><span>←</span> Вернуться к расписанию</a>
    </div>
</body>
</html>
